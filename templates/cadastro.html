<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>

<body>
    <h1>Criar Conta</h1>
    <p>Cadastre-se gratuitamente</p>

    <form action="/cadastro" method="POST">
        <label for="name">Nome completo</label><br>
        <input type="text" id="name" name="name" placeholder="Seu Nome Completo" required><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required><br>

        <label for="senha1">Senha</label><br>
        <input type="password" id="senha1" name="senha1" placeholder="••••••••" required><br>

        <label for="senha2">Confirmar senha</label><br>
        <input type="password" id="senha2" name="senha2" placeholder="••••••••" required><br>

        <input type="submit" value="Criar Conta">
    </form>

    <p>Ou continue com</p>

    <button>Google</button>
    <button>Apple</button>

    <p>Já possui uma conta?</p><a href="/login">Entrar</a>

</body>

</html>
